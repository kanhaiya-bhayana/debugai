name: DebugAI CI Analysis

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  debugai:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install DebugAI
        run: |
          pip install git+https://github.com/kanhaiya-bhayana/debugai.git
          pip install openai

      # ✅ Create a realistic test log
      - name: Simulate error log
        run: |
          cat <<EOF > logs.txt
          2026-03-17 10:22:01 INFO Starting service
          2026-03-17 10:22:02 INFO Processing order

          System.KeyNotFoundException
          at CacheService.Get()
          at ProductService.Fetch()

          INFO Retrying...

          System.TimeoutException
          at RetryService.Call()
          EOF

      # ✅ Debug: show what DebugAI will receive
      - name: Show logs
        run: |
          echo "===== LOG CONTENT ====="
          cat logs.txt
          echo "======================="

      # ✅ Run DebugAI
      - name: Run DebugAI
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          cat logs.txt | debugai --ai > debugai_output.txt || true

      - name: Comment on PR (only if error exists)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const output = fs.readFileSync('debugai_output.txt', 'utf8');

            // ❌ Skip if no error detected
            if (output.includes("No stack trace detected")) {
              console.log("No error found — skipping PR comment");
              return;
            }

            const marker = "<!-- DEBUGAI_COMMENT -->";

            const body = `
            ${marker}
            🤖 **DebugAI Analysis**

            \`\`\`
            ${output}
            \`\`\`
            `;

            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const existingComment = comments.data.find(comment =>
              comment.body.includes(marker)
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                comment_id: existingComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }
