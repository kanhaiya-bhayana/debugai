- name: Run DebugAI
  env:
    NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
  run: |
    cat logs.txt | debugai --ai

on:
  push:
  pull_request:

jobs:
  debugai:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install DebugAI
        run: pip install git+https://github.com/yourusername/debugai.git

      - name: Run tests and capture logs
        run: |
          echo "Running tests..."
          pytest 2>&1 | tee logs.txt || true

      - name: Run DebugAI
        run: |
          cat logs.txt | debugai --ai