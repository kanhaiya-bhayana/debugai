name: DebugAI CI Analysis

on:
  push:
  pull_request:

jobs:
  debugai:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pytest
          pip install git+https://github.com/kanhaiya-bhayana/debugai.git
          pip install openai

      - name: Run DebugAI
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          echo "Simulating error..."
          cat error.log | debugai --ai || true
