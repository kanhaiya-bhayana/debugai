name: DebugAI CI Analysis

on:
  push:
  pull_request:

jobs:
  debugai:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install DebugAI
        run: |
          pip install git+https://github.com/kanhaiya-bhayana/debugai.git

      # ✅ Create a realistic test log
      - name: Simulate error log
        run: |
          cat <<EOF > logs.txt
          2026-03-17 10:22:01 INFO Starting service
          2026-03-17 10:22:02 INFO Processing order

          System.NullReferenceException
          at OrderService.CalculateTotal()
          at CartService.Checkout()

          INFO Retrying...

          System.TimeoutException
          at RetryService.Call()
          EOF

      # ✅ Debug: show what DebugAI will receive
      - name: Show logs
        run: |
          echo "===== LOG CONTENT ====="
          cat logs.txt
          echo "======================="

      # ✅ Run DebugAI
      - name: Run DebugAI
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          cat logs.txt | debugai --ai || true